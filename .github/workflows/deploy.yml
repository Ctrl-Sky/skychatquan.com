name: Deploy Hugo Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.0'

      # Build the hugo site, --minify reduces file sizes and then saves to public/
      - name: Build
        run: cd skychatquan.com && hugo --minify

      # Copy website content to server
      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "skychatquan.com/public/*"
          target: "/var/www/skychatquan.com"
          strip_components: 2